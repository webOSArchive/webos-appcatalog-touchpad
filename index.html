<body>
  <script type="text/javascript">
    // noWindow launcher
    (function () {
		var appLauncher = enyo.application.appCatLauncher = new findApps.AppCatalogLauncher();

			enyo.application.appCatLauncher.relaunch(params);
		};
	
		appLauncher.startup();
	})();
  </script>
